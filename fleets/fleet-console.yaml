apiVersion: ingress.jpmc.com/v1alpha1
kind: Fleet
metadata:
  name: fleet-console
  namespace: ingress-system
  labels:
    app.kubernetes.io/managed-by: management-api
spec:
  name: "Console"
  subdomain: "console.jpm.com"
  gatewayType: envoy
  replicas: 2
  nodes:
    - name: "fleet-console-envoy-1"
      index: 1
      datacenter: "us-east-2"
      region: "us-east-2"
      status: "running"
    - name: "fleet-console-envoy-2"
      index: 2
      datacenter: "eu-west-1"
      region: "eu-west-1"
      status: "running"
